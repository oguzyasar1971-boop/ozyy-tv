<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ozyy TV Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#0b1020;color:white}

/* HEADER */
.header{
  height:60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  background:#020617;
}
.logo{color:#3b82f6;font-weight:bold;font-size:20px}

/* TOPBAR */
.topbar{
  display:flex;
  gap:10px;
  padding:10px;
}
.topbar input{
  flex:1;
  padding:10px;
  border-radius:8px;
  border:none;
}
.topbar button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
}

/* LAYOUT */
.app{
  display:grid;
  grid-template-columns:200px 1fr 350px;
  height:calc(100vh - 110px);
}

/* CATEGORY */
.categories{
  background:#020617;
  overflow:auto;
}
.category{
  padding:10px;
  cursor:pointer;
}
.category:hover{background:#1e293b}

/* CHANNEL LIST */
.center{
  padding:10px;
  overflow:auto;
}
.search{
  width:100%;
  padding:10px;
  margin-bottom:10px;
}
.channel{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  border-bottom:1px solid #111;
  cursor:pointer;
}
.channel:hover{background:#1e293b}

/* LOGO */
.channel img{
  width:40px;
  height:40px;
  border-radius:8px;
}

/* OZYY LOGO */
.ozyyLogo{
  width:40px;
  height:40px;
  border-radius:8px;
  background:#020617;
  color:#3b82f6;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
  font-weight:bold;
}

/* PLAYER */
.playerPanel{
  background:#020617;
}
video{
  width:100%;
  height:220px;
  background:black;
}
.info{padding:10px}
</style>
</head>

<body>

<div class="header">
  <div class="logo">OZYY TV</div>
</div>

<div class="topbar">
  <input id="m3uUrl" value="https://iptv-org.github.io/iptv/countries/tr.m3u">
  <button onclick="loadM3U()">Yükle</button>
</div>

<div class="app">

<div class="categories" id="categories"></div>

<div class="center">
  <input class="search" id="searchBox" placeholder="Ara..." oninput="renderChannels()">
  <div id="channelList"></div>
</div>

<div class="playerPanel">
  <video id="video" controls></video>
  <div class="info">
    <h3 id="title">Kanal seç</h3>
  </div>
</div>

</div>

<script>
let channels=[];
let currentCategory="All";
let currentChannel=null;
let hls=null;

/* M3U LOAD */
async function loadM3U(){
  let url=document.getElementById("m3uUrl").value;
  let res=await fetch(url);
  let text=await res.text();
  parseM3U(text);
  renderCategories();
  renderChannels();
}

/* PARSE */
function parseM3U(text){
  channels=[];
  let lines=text.split("\n");

  for(let i=0;i<lines.length;i++){
    let line=lines[i];

    if(line.startsWith("#EXTINF")){
      let name=line.split(",").pop();

      let logo=line.match(/tvg-logo="(.*?)"/)?.[1] || "";
      let group=line.match(/group-title="(.*?)"/)?.[1] || "Other";

      let url=lines[i+1];

      channels.push({name,logo,url,group});
    }
  }
}

/* CATEGORY */
function renderCategories(){
  let box=document.getElementById("categories");
  box.innerHTML="";

  let cats=["All"];
  channels.forEach(c=>{
    if(!cats.includes(c.group)) cats.push(c.group);
  });

  cats.forEach(cat=>{
    let div=document.createElement("div");
    div.className="category";
    div.innerText=cat;
    div.onclick=()=>{currentCategory=cat;renderChannels()};
    box.appendChild(div);
  });
}

/* CHANNEL LIST */
function renderChannels(){
  let list=document.getElementById("channelList");
  list.innerHTML="";

  let search=document.getElementById("searchBox").value.toLowerCase();

  channels.filter(c=>{
    return (currentCategory=="All"||c.group==currentCategory) &&
           c.name.toLowerCase().includes(search);
  }).forEach(ch=>{
    list.appendChild(createChannel(ch));
  });
}

/* CHANNEL UI */
function createChannel(ch){
  let div=document.createElement("div");
  div.className="channel";

  let logoHtml=ch.logo
    ? `<img src="${ch.logo}" onerror="this.outerHTML='<div class=\\'ozyyLogo\\'>OZYY</div>'">`
    : `<div class="ozyyLogo">OZYY</div>`;

  div.innerHTML=`
    ${logoHtml}
    <span>${ch.name}</span>
  `;

  div.onclick=()=>playChannel(ch);

  return div;
}

/* PLAY */
function playChannel(ch){
  currentChannel=ch;
  document.getElementById("title").innerText=ch.name;
  play(ch.url);
}

function play(url){
  let video=document.getElementById("video");

  if(hls){hls.destroy()}

  if(Hls.isSupported()){
    hls=new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  }else{
    video.src=url;
  }
}

loadM3U();
</script>

</body>
</html>
