<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ozyy TV Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{box-sizing:border-box}
body{margin:0;background:#080b14;color:white;font-family:Arial,sans-serif}
.top{height:64px;background:#050711;display:flex;align-items:center;gap:26px;padding:0 28px;border-bottom:1px solid #1f2433}
.top a{color:white;text-decoration:none;font-weight:bold}
.top .active{color:#f5d142}
.logo{margin-left:auto;font-weight:bold;color:#2f7cff;font-size:24px}
.loadbar{display:flex;gap:10px;padding:14px 24px;background:#101522}
.loadbar input{flex:1;padding:12px;border-radius:8px;border:0;font-size:15px}
.loadbar button{padding:12px 18px;border:0;border-radius:8px;background:#2f4cff;color:white;font-weight:bold}
.app{display:grid;grid-template-columns:260px 1fr 42%;height:calc(100vh - 114px)}
.panel{overflow:auto;border-right:1px solid #303447;background:#141722}
.row{padding:14px 18px;border-bottom:1px solid #303447;cursor:pointer;font-weight:bold}
.row:hover,.row.active{background:#28324c;color:#f5d142}
.channel{display:flex;align-items:center;gap:12px}
.channel img{width:28px;height:28px;object-fit:contain;border-radius:4px;background:#222}
.player{background:#0b0f1c;display:flex;flex-direction:column}
video{width:100%;height:55%;background:black}
.info{padding:20px}
.info h1{margin:0 0 10px;font-size:28px}
.badge{color:#30ff7a;font-weight:bold}
.actions{display:flex;gap:10px;margin-top:16px}
.actions button{flex:1;padding:12px;border:0;border-radius:9px;background:#2b2245;color:white;font-weight:bold}
.search{padding:12px;background:#141722;border-bottom:1px solid #303447}
.search input{width:100%;padding:12px;border-radius:8px;border:0}
.small{font-size:13px;color:#bbb;margin-top:10px}
</style>
</head>

<body>

<div class="top">
  <a>Home</a>
  <a class="active">Canlı yayın</a>
  <a>Filmler</a>
  <a>Diziler</a>
  <div class="logo">OZYY</div>
</div>

<div class="loadbar">
  <input id="m3uUrl" value="https://iptv-org.github.io/iptv/countries/tr.m3u">
  <button onclick="loadM3U()">M3U Yükle</button>
</div>

<div class="app">
  <div class="panel" id="groups"></div>

  <div class="panel">
    <div class="search">
      <input id="search" placeholder="Kanal ara..." oninput="renderChannels()">
    </div>
    <div id="channels"></div>
  </div>

  <div class="player">
    <video id="video" controls autoplay></video>
    <div class="info">
      <h1 id="title">Ozyy TV Player</h1>
      <div><span class="badge">LIVE</span> <span id="status">Kanal seç → otomatik oynar</span></div>
      <div class="small" id="meta">M3U / HLS destekli test sürümü</div>

      <div class="actions">
        <button onclick="addFav()">⭐ Favori</button>
        <button onclick="showFavs()">Favoriler</button>
        <button onclick="showRecent()">Son izlenen</button>
      </div>
    </div>
  </div>
</div>

<script>
let allChannels = [];
let currentGroup = "All";
let currentChannel = null;
let hls = null;

let favs = JSON.parse(localStorage.getItem("favs") || "[]");
let recent = JSON.parse(localStorage.getItem("recent") || "[]");

async function loadM3U(){
  const url = document.getElementById("m3uUrl").value.trim();
  document.getElementById("status").innerText = "M3U yükleniyor...";

  try{
    const res = await fetch(url);
    const text = await res.text();
    parseM3U(text);
    renderGroups();
    renderChannels();
    document.getElementById("status").innerText = allChannels.length + " kanal yüklendi";
  }catch(e){
    document.getElementById("status").innerText = "M3U yüklenemedi";
    alert("M3U açılamadı. Link CORS engelli olabilir.");
  }
}

function parseM3U(text){
  allChannels = [];
  const lines = text.split(/\r?\n/);

  for(let i=0;i<lines.length;i++){
    if(lines[i].startsWith("#EXTINF")){
      let info = lines[i];
      let url = lines[i+1] || "";

      let name = info.split(",").pop().trim();
      let group = getAttr(info,"group-title") || "Undefined";
      let logo = getAttr(info,"tvg-logo") || "";

      if(url.startsWith("http")){
        allChannels.push({name,group,logo,url});
      }
    }
  }
}

function getAttr(text, attr){
  const match = text.match(new RegExp(attr + '="([^"]*)"'));
  return match ? match[1] : "";
}

function renderGroups(){
  const groups = ["All","⭐ Favoriler","🕘 Son izlenen",...new Set(allChannels.map(c=>c.group))];
  document.getElementById("groups").innerHTML = groups.map(g =>
    `<div class="row ${g===currentGroup?'active':''}" onclick="selectGroup('${escapeText(g)}')">${g}</div>`
  ).join("");
}

function selectGroup(g){
  currentGroup = g;
  renderGroups();
  renderChannels();
}

function renderChannels(){
  const q = document.getElementById("search").value.toLowerCase();

  let list = allChannels;

  if(currentGroup === "⭐ Favoriler"){
    list = favs;
  }else if(currentGroup === "🕘 Son izlenen"){
    list = recent;
  }else if(currentGroup !== "All"){
    list = list.filter(c => c.group === currentGroup);
  }

  list = list.filter(c => c.name.toLowerCase().includes(q));

  document.getElementById("channels").innerHTML = list.map((c,idx) => `
    <div class="row channel" onclick='playChannel(${JSON.stringify(c)})'>
      ${c.logo ? `<img src="${c.logo}">` : `<span>📺</span>`}
      <span>${c.name}</span>
    </div>
  `).join("");
}

function playChannel(ch){
  currentChannel = ch;
  document.getElementById("title").innerText = ch.name;
  document.getElementById("status").innerText = "Oynatılıyor";
  document.getElementById("meta").innerText = ch.group;

  recent = recent.filter(x => x.url !== ch.url);
  recent.unshift(ch);
  recent = recent.slice(0,20);
  localStorage.setItem("recent", JSON.stringify(recent));

  play(ch.url);
}

function play(url){
  const video = document.getElementById("video");

  if(hls){
    hls.destroy();
    hls = null;
  }

  if(Hls.isSupported()){
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
  }else{
    video.src = url;
    video.play();
  }
}

function addFav(){
  if(!currentChannel){
    alert("Önce kanal seç");
    return;
  }
  if(!favs.find(x => x.url === currentChannel.url)){
    favs.push(currentChannel);
    localStorage.setItem("favs", JSON.stringify(favs));
    alert("Favorilere eklendi");
  }else{
    alert("Zaten favorilerde");
  }
}

function showFavs(){
  currentGroup = "⭐ Favoriler";
  renderGroups();
  renderChannels();
}

function showRecent(){
  currentGroup = "🕘 Son izlenen";
  renderGroups();
  renderChannels();
}

function escapeText(t){
  return t.replace(/'/g,"\\'");
}

loadM3U();
</script>

</body>
</html>
