<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ozyy TV Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

.header {
  display:flex;
  justify-content:space-between;
  padding:10px 20px;
  background:#020617;
}

.menu span {
  margin-right:20px;
  cursor:pointer;
}

.container {
  display:flex;
  height:90vh;
}

.sidebar {
  width:250px;
  background:#020617;
  overflow:auto;
}

.channel {
  padding:10px;
  border-bottom:1px solid #111;
  cursor:pointer;
}

.channel:hover {
  background:#1e293b;
}

.player {
  flex:1;
  display:flex;
  flex-direction:column;
}

video {
  width:100%;
  height:60%;
  background:black;
}

.info {
  padding:20px;
}
</style>
</head>

<body>

<div class="header">
  <div class="menu">
    <span>Canlı TV</span>
    <span>Filmler</span>
    <span>Diziler</span>
  </div>
  <div>OZYY</div>
</div>

<div class="container">

<div class="sidebar">
  <div class="channel" onclick="play('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8')">TRT 1</div>
  <div class="channel" onclick="play('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8')">SHOW TV</div>
  <div class="channel" onclick="play('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8')">ATV</div>
</div>

<div class="player">
  <video id="video" controls></video>
  <div class="info">
    <h2>Ozyy TV Player</h2>
    <p>Kanal seç → otomatik oynar</p>
  </div>
</div>

</div>

<script>
let video = document.getElementById("video");

function play(url) {
  if (Hls.isSupported()) {
    let hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    video.muted = true;
    video.play();
  } else {
    video.src = url;
    video.muted = true;
    video.play();
  }
}
</script>

</body>
</html>
