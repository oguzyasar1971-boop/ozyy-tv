<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ozyy TV Player</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

.header {
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#020617;
}

.menu {
  display:flex;
  gap:15px;
}

.menu span {
  cursor:pointer;
}

.container {
  display:flex;
  height:90vh;
}

.sidebar {
  width:30%;
  overflow:auto;
  border-right:1px solid #333;
}

.channel {
  padding:10px;
  border-bottom:1px solid #333;
  cursor:pointer;
}

.channel:hover {
  background:#1e293b;
}

.player {
  width:70%;
  display:flex;
  flex-direction:column;
}

video {
  width:100%;
  height:60%;
  background:black;
}

.info {
  padding:10px;
}
</style>
</head>

<body>

<div class="header">
  <div class="menu">
    <span>Canlı TV</span>
    <span>Filmler</span>
    <span>Diziler</span>
  </div>
</div>

<div class="container">

<div class="sidebar">

<div class="channel" onclick="play('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8')">TRT 1</div>
<div class="channel" onclick="play('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8')">SHOW TV</div>
<div class="channel" onclick="play('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8')">ATV</div>

</div>

<div class="player">
<video id="video" controls autoplay></video>

<div class="info">
<h3>Ozyy TV Player</h3>
<p>Kanal seç → otomatik oynar</p>
</div>

</div>

</div>

<script>
function play(url){
  document.getElementById("video").src = url;
}
</script>

</body>
</html>
