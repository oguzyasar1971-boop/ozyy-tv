<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ozyy TV Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;font-family:Arial;background:#070b1a;color:white}
.header{display:flex;gap:25px;align-items:center;padding:12px 20px;background:#020617;font-size:18px}
.logo{margin-left:auto;color:#38bdf8;font-weight:bold}
.login{padding:15px;background:#111827;display:flex;gap:10px}
.login input{flex:1;padding:10px;border-radius:8px;border:0}
.login button{padding:10px 15px;border:0;border-radius:8px;background:#2563eb;color:white;font-weight:bold}
.app{display:flex;height:82vh}
.groups{width:28%;background:#111827;overflow:auto;border-right:2px solid #333}
.channels{width:32%;background:#0f172a;overflow:auto;border-right:2px solid #333}
.player{flex:1;background:#020617}
.item{padding:14px;border-bottom:1px solid #333;cursor:pointer}
.item:hover{background:#1e293b}
.active{background:#334155;color:#facc15}
video{width:100%;height:55%;background:black}
.info{padding:18px}
.badge{color:#22c55e;font-weight:bold}
</style>
</head>

<body>

<div class="header">
  <span>Home</span>
  <span>Canlı yayın</span>
  <span>Filmler</span>
  <span>Diziler</span>
  <span class="logo">OZYY</span>
</div>

<div class="login">
  <input id="m3uUrl" placeholder="M3U link yapıştır">
  <button onclick="loadM3U()">M3U Yükle</button>
</div>

<div class="app">
  <div class="groups" id="groups">
    <div class="item active">All</div>
  </div>

  <div class="channels" id="channels">
    <div class="item" onclick="play('TRT Test','https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8')">TRT Test</div>
    <div class="item" onclick="play('SHOW Test','https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8')">SHOW Test</div>
  </div>

  <div class="player">
    <video id="video" controls></video>
    <div class="info">
      <h2 id="title">Ozyy TV Player</h2>
      <p><span class="badge">LIVE</span> Kanal seç → otomatik oynar</p>
      <p id="status">Hazır</p>
    </div>
  </div>
</div>

<script>
let video = document.getElementById("video");
let hls;
let allChannels = [];

function play(name, url){
  document.getElementById("title").innerText = name;
  document.getElementById("status").innerText = "Yükleniyor...";

  if(hls){ hls.destroy(); }

  if(Hls.isSupported()){
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, function(){
      video.muted = true;
      video.play();
      document.getElementById("status").innerText = "Oynatılıyor";
    });
  } else {
    video.src = url;
    video.muted = true;
    video.play();
    document.getElementById("status").innerText = "Oynatılıyor";
  }
}

async function loadM3U(){
  let url = document.getElementById("m3uUrl").value.trim();
  if(!url){ alert("M3U link yaz"); return; }

  document.getElementById("status").innerText = "M3U yükleniyor...";

  try{
    let res = await fetch(url);
    let text = await res.text();
    parseM3U(text);
  }catch(e){
    alert("M3U yüklenemedi. Link CORS engelli olabilir.");
    document.getElementById("status").innerText = "M3U hata verdi";
  }
}

function parseM3U(text){
  allChannels = [];
  let lines = text.split("\n");

  for(let i=0; i<lines.length; i++){
    let line = lines[i].trim();

    if(line.startsWith("#EXTINF")){
      let name = line.split(",").pop().trim();
      let groupMatch = line.match(/group-title="([^"]*)"/);
      let logoMatch = line.match(/tvg-logo="([^"]*)"/);

      let group = groupMatch ? groupMatch[1] : "Genel";
      let logo = logoMatch ? logoMatch[1] : "";
      let stream = lines[i+1] ? lines[i+1].trim() : "";

      if(stream.startsWith("http")){
        allChannels.push({name, group, logo, stream});
      }
    }
  }

  renderGroups();
  renderChannels(allChannels);
  document.getElementById("status").innerText = allChannels.length + " kanal yüklendi";
}

function renderGroups(){
  let groups = ["All", ...new Set(allChannels.map(c => c.group))];
  document.getElementById("groups").innerHTML = groups.map(g =>
    `<div class="item" onclick="filterGroup('${g.replace(/'/g,"")}')">${g}</div>`
  ).join("");
}

function filterGroup(group){
  if(group === "All"){
    renderChannels(allChannels);
  } else {
    renderChannels(allChannels.filter(c => c.group === group));
  }
}

function renderChannels(list){
  document.getElementById("channels").innerHTML = list.map(c =>
    `<div class="item" onclick="play('${c.name.replace(/'/g,"")}', '${c.stream}')">${c.name}</div>`
  ).join("");
}
</script>

</body>
</html>
