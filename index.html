<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ozyy TV Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#0b1020;color:white}
.header{height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:linear-gradient(90deg,#111827,#020617);border-bottom:1px solid rgba(255,255,255,.08)}
.menu span{margin-right:30px;font-size:18px;cursor:pointer}
.menu span.active{color:#facc15}
.logo{color:#3b82f6;font-weight:bold;font-size:22px;letter-spacing:2px}
.topbar{display:flex;gap:12px;padding:16px 28px;background:rgba(255,255,255,.04)}
.topbar input{flex:1;padding:14px;border-radius:10px;border:none;font-size:15px}
.topbar button{padding:0 22px;border:none;border-radius:10px;background:#2563eb;color:white;font-weight:bold;cursor:pointer}
.app{display:grid;grid-template-columns:260px 1fr 420px;height:calc(100vh - 118px)}
.categories{background:rgba(255,255,255,.04);border-right:1px solid rgba(255,255,255,.1);overflow:auto}
.category{padding:15px 22px;border-bottom:1px solid rgba(255,255,255,.08);cursor:pointer;font-weight:bold}
.category:hover,.category.active{background:rgba(59,130,246,.25);color:#facc15}
.center{background:linear-gradient(180deg,#111827,#0f172a);overflow:auto;padding:18px}
.search{width:100%;padding:14px;border-radius:10px;border:none;margin-bottom:15px}
.channel{display:flex;align-items:center;gap:14px;padding:12px;border-bottom:1px solid rgba(255,255,255,.08);cursor:pointer;border-radius:8px}
.channel:hover{background:rgba(59,130,246,.25)}
.channel img{width:42px;height:42px;border-radius:10px;object-fit:contain;background:#020617;padding:4px}
.channel span{font-weight:bold}
.playerPanel{background:linear-gradient(180deg,#111827,#020617);border-left:1px solid rgba(255,255,255,.1)}
video{width:100%;height:260px;background:black}
.info{padding:22px}
.info h2{margin:0 0 10px;font-size:28px}
.live{color:#22c55e;font-weight:bold}
.buttons{display:flex;gap:10px;margin-top:20px}
.buttons button{flex:1;padding:13px;border:none;border-radius:10px;background:#334155;color:white;font-weight:bold}
@media(max-width:900px){
  .app{grid-template-columns:150px 1fr}
  .playerPanel{grid-column:2}
  .menu span{margin-right:14px;font-size:15px}
}
</style>
</head>

<body>

<div class="header">
  <div class="menu">
    <span>Home</span>
    <span class="active">Canlı yayın</span>
    <span>Filmler</span>
    <span>Diziler</span>
  </div>
  <div class="logo">OZYY</div>
</div>

<div class="topbar">
  <input id="m3uUrl" value="https://iptv-org.github.io/iptv/countries/tr.m3u">
  <button onclick="loadM3U()">M3U Yükle</button>
</div>

<div class="app">
  <div class="categories" id="categories"></div>

  <div class="center">
    <input class="search" id="searchBox" placeholder="Kanal ara..." oninput="renderChannels()">
    <div id="channelList"></div>
  </div>

  <div class="playerPanel">
    <video id="video" controls></video>
    <div class="info">
      <h2 id="channelTitle">Kanal seç</h2>
      <p><span class="live">LIVE</span> <span id="status">Hazır</span></p>
      <p id="groupInfo"></p>
      <div class="buttons">
        <button onclick="addFavorite()">⭐ Favori</button>
        <button onclick="showFavorites()">Favoriler</button>
        <button onclick="showRecent()">Son izlenen</button>
      </div>
    </div>
  </div>
</div>

<script>
let channels = [];
let currentCategory = "All";
let currentChannel = null;
let hls = null;

const placeholderLogo = "https://dummyimage.com/100x100/0f172a/3b82f6&text=OZYY";

async function loadM3U(){
  const url = document.getElementById("m3uUrl").value.trim();
  if(!url){ alert("M3U link yaz"); return; }

  document.getElementById("status").innerText = "M3U yükleniyor...";

  try{
    const res = await fetch(url);
    const text = await res.text();
    parseM3U(text);
    renderCategories();
    renderChannels();
    document.getElementById("status").innerText = "Kanallar yüklendi";
  }catch(e){
    alert("M3U yüklenemedi. Link CORS engelli olabilir.");
    document.getElementById("status").innerText = "Hata";
  }
}

function parseM3U(text){
  channels = [];
  const lines = text.split("\n");

  for(let i=0;i<lines.length;i++){
    const line = lines[i].trim();

    if(line.startsWith("#EXTINF")){
      const name = line.split(",").pop().trim();

      const logoMatch = line.match(/tvg-logo="(.*?)"/);
      const groupMatch = line.match(/group-title="(.*?)"/);

      const logo = logoMatch ? logoMatch[1] : "";
      const group = groupMatch ? groupMatch[1] : "Undefined";

      const streamUrl = lines[i+1] ? lines[i+1].trim() : "";

      if(streamUrl && !streamUrl.startsWith("#")){
        channels.push({name,url:streamUrl,logo,group});
      }
    }
  }
}

function renderCategories(){
  const cats = ["All","⭐ Favoriler","🕘 Son izlenen"];
  channels.forEach(c=>{
    if(!cats.includes(c.group)) cats.push(c.group);
  });

  const box = document.getElementById("categories");
  box.innerHTML = "";

  cats.forEach(cat=>{
    const div = document.createElement("div");
    div.className = "category" + (cat === currentCategory ? " active" : "");
    div.innerText = cat;

    if(cat === "⭐ Favoriler") div.onclick = showFavorites;
    else if(cat === "🕘 Son izlenen") div.onclick = showRecent;
    else div.onclick = ()=>filterCategory(cat);

    box.appendChild(div);
  });
}

function filterCategory(cat){
  currentCategory = cat;
  renderCategories();
  renderChannels();
}

function renderChannels(customList){
  const list = document.getElementById("channelList");
  list.innerHTML = "";

  const search = document.getElementById("searchBox").value.toLowerCase();

  let data = customList || channels.filter(c=>{
    const byCat = currentCategory === "All" || c.group === currentCategory;
    const bySearch = c.name.toLowerCase().includes(search);
    return byCat && bySearch;
  });

  data.forEach(ch=>list.appendChild(createChannel(ch)));
}

function createChannel(ch){
  const div = document.createElement("div");
  div.className = "channel";

  div.innerHTML = `
    <img src="${ch.logo || placeholderLogo}" onerror="this.src='${placeholderLogo}'">
    <span>${ch.name}</span>
  `;

  div.onclick = ()=>playChannel(ch);
  return div;
}

function playChannel(ch){
  currentChannel = ch;

  document.getElementById("channelTitle").innerText = ch.name;
  document.getElementById("groupInfo").innerText = ch.group;
  document.getElementById("status").innerText = "Oynatılıyor";

  saveRecent(ch);
  play(ch.url);
}

function play(url){
  const video = document.getElementById("video");

  if(hls){
    hls.destroy();
    hls = null;
  }

  if(Hls.isSupported()){
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, function(){
      video.play().catch(()=>{});
    });
  }else{
    video.src = url;
    video.play().catch(()=>{});
  }
}

function addFavorite(){
  if(!currentChannel){
    alert("Önce kanal seç");
    return;
  }

  let favs = JSON.parse(localStorage.getItem("favorites") || "[]");

  if(!favs.find(x=>x.url === currentChannel.url)){
    favs.push(currentChannel);
    localStorage.setItem("favorites", JSON.stringify(favs));
    alert("Favorilere eklendi");
  }else{
    alert("Zaten favorilerde");
  }
}

function showFavorites(){
  currentCategory = "⭐ Favoriler";
  renderCategories();
  const favs = JSON.parse(localStorage.getItem("favorites") || "[]");
  renderChannels(favs);
}

function saveRecent(ch){
  let rec = JSON.parse(localStorage.getItem("recent") || "[]");
  rec = rec.filter(x=>x.url !== ch.url);
  rec.unshift(ch);
  rec = rec.slice(0,20);
  localStorage.setItem("recent", JSON.stringify(rec));
}

function showRecent(){
  currentCategory = "🕘 Son izlenen";
  renderCategories();
  const rec = JSON.parse(localStorage.getItem("recent") || "[]");
  renderChannels(rec);
}

loadM3U();
</script>

</body>
</html>
